# Copy this file to config.ini and fill in your own values.
# NEVER share config.ini or the .session file with anyone —
# together they give full access to your Telegram account.

[telegram]
# Get these two free at https://my.telegram.org -> "API development tools"
api_id = 1234567
api_hash = 0123456789abcdef0123456789abcdef

# Which groups/channels to watch, comma separated.
# You can use the @username, the exact group title, or the numeric chat id.
# Leave EMPTY to watch every group/channel you are a member of.
# Example: watch_chats = @GoldSignalsVIP, Forex Kings, -1001234567890
watch_chats =

# Where matched signals are forwarded so your phone rings:
#   me                = your own "Saved Messages"
#   @YourAlertChannel = a private channel you created (recommended —
#                       set a LOUD custom notification sound on it)
forward_to = me

[filter]
# A message must contain at least one gold keyword...
gold_keywords = gold, xauusd, xau/usd, xau
# ...and (if require_action_word is true) at least one action keyword.
# This stops chit-chat like "gold is moving today" from ringing your phone.
action_keywords = buy, sell, long, short, entry, tp, sl, take profit, stop loss, target
require_action_word = true

[ntfy]
# Free push notifications that can ring through silent mode.
# 1. Install the "ntfy" app (Android/iPhone), subscribe to your topic.
# 2. Pick a topic name nobody can guess, e.g. sujon-gold-8k2p1x
# 3. In the ntfy app, set the topic's priority behaviour to
#    "Instant delivery" / allow it to override Do Not Disturb.
enabled = false
server = https://ntfy.sh
topic =

[pushover]
# Paid app (one-time ~$5) but the most reliable "wake me up" option:
# emergency alerts repeat every 30 seconds until you acknowledge them.
# Get keys at https://pushover.net after creating an application.
enabled = false
user_key =
app_token =

[callmebot]
# Makes your Telegram actually RING with a voice call on each signal.
# One-time setup: open a chat with @CallMeBot_txt2voice on Telegram and
# press Start (this authorizes calls to your account). Requires a public
# Telegram @username on your account.
enabled = false
telegram_username =
