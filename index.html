<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#f7f4ed" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Attendance" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<title>Attendance</title>
<style>
  :root {
    --bg: oklch(0.975 0.006 85);
    --surface: #ffffff;
    --surface-2: oklch(0.965 0.008 85);
    --ink: oklch(0.22 0.01 80);
    --ink-2: oklch(0.42 0.01 80);
    --muted: oklch(0.6 0.01 80);
    --line: oklch(0.92 0.008 85);
    --line-2: oklch(0.88 0.01 85);
    --accent: oklch(0.42 0.08 145);
    --accent-soft: oklch(0.94 0.04 145);
    --accent-ink: oklch(0.32 0.08 145);
    --present: oklch(0.5 0.1 145);
    --present-soft: oklch(0.93 0.05 145);
    --absent: oklch(0.55 0.14 28);
    --absent-soft: oklch(0.94 0.04 28);
    --warn: oklch(0.7 0.13 75);
    --shadow: 0 1px 2px rgba(40,30,10,.04), 0 8px 24px -12px rgba(40,30,10,.08);
    --r-card: 18px;
    --r-pill: 999px;
    --r-btn: 12px;
    --pad-x: 18px;
    --tab-h: 64px;
    --header-h: 132px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.4;
    letter-spacing: 0;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
    min-height: 100vh;
    min-height: 100dvh;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* App shell -- center on desktop, fill on mobile */
  .app {
    max-width: 460px;
    height: 100vh;
    height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px var(--line);
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 480px) { .app { box-shadow: none; } }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: color-mix(in oklch, var(--bg) 92%, transparent);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    padding: max(env(safe-area-inset-top), 12px) var(--pad-x) 10px;
    border-bottom: 1px solid var(--line);
  }
  .topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    height: 36px;
  }
  .brand {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .brand .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    transition: background .15s;
  }
  .icon-btn:hover { background: var(--surface-2); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* Class switcher */
  .class-switch {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .title-block h1 {
    margin: 0;
    font-size: 26px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: 0;
  }
  .title-block .sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .class-pills {
    display: inline-flex;
    background: var(--surface-2);
    padding: 3px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
  }
  .class-pill {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-radius: var(--r-pill);
    letter-spacing: 0.03em;
  }
  .class-pill[aria-pressed="true"] {
    background: var(--ink);
    color: white;
  }

  /* Tabs (sub-nav under header) */
  .subnav {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .subnav::-webkit-scrollbar { display: none; }
  .subnav button {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
  }
  .subnav button[aria-current="true"] {
    background: var(--accent-soft);
    color: var(--accent-ink);
  }

  /* Main scroll area */
  .main {
    flex: 1;
    padding: 14px var(--pad-x) calc(var(--tab-h) + 18px + env(safe-area-inset-bottom));
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-padding-top: 12px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--r-card);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }

  /* Today view */
  .session-bar {
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .session-bar .field {
    flex: 1 1 130px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }
  .field input, .field select {
    border: 1px solid var(--line-2);
    background: var(--surface);
    padding: 10px 12px;
    border-radius: var(--r-btn);
    font-size: 15px;
    font-weight: 500;
  }
  .slot-toggle {
    display: inline-flex;
    background: var(--surface-2);
    padding: 3px;
    border-radius: var(--r-btn);
    border: 1px solid var(--line-2);
  }
  .slot-toggle button {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }
  .slot-toggle button[aria-pressed="true"] {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 14px 0 10px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat .v {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
  }
  .stat .l {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .stat.present .v { color: var(--present); }
  .stat.absent .v { color: var(--absent); }

  .quick-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 8px 12px;
    border-radius: var(--r-pill);
    background: var(--surface);
    border: 1px solid var(--line-2);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { background: var(--surface-2); }
  .chip svg { width: 14px; height: 14px; }
  .chip.danger { color: var(--absent); }

  /* Save action kept near the top so it never blocks the last roster row */
  .save-actions {
    position: sticky;
    top: 0;
    z-index: 12;
    margin: 2px calc(var(--pad-x) * -1) 10px;
    padding: 8px var(--pad-x);
    background: color-mix(in oklch, var(--bg) 94%, transparent);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
  }
  .save-action {
    width: 100%;
    min-height: 54px;
    background: var(--ink);
    color: white;
    border-radius: var(--r-btn);
    padding: 10px 14px;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 6px 22px -12px rgba(40,30,10,.45);
  }
  .save-action.is-pending { background: var(--accent); }
  .save-action:active { transform: translateY(1px); }
  .save-action .save-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.15;
  }
  .save-action .label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .save-action .hint {
    margin-top: 3px;
    color: rgba(255,255,255,.72);
    font-size: 12px;
    font-weight: 500;
  }
  .save-action .count {
    flex: 0 0 auto;
    background: rgba(255,255,255,.18);
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Student row */
  .roster-list {
    background: var(--surface);
    border-radius: var(--r-card);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    min-height: 64px;
  }
  .row:last-child { border-bottom: 0; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--ink-2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
    flex: 0 0 auto;
    border: 1px solid var(--line);
  }
  .row.is-present .avatar { background: var(--present-soft); color: var(--accent-ink); border-color: transparent; }
  .row.is-absent .avatar { background: var(--absent-soft); color: var(--absent); border-color: transparent; }
  .who {
    flex: 1;
    min-width: 0;
  }
  .who .name {
    font-weight: 600;
    font-size: 14.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .who .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .pa-toggle {
    display: inline-flex;
    background: var(--surface-2);
    border-radius: var(--r-pill);
    padding: 3px;
    border: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .pa-toggle button {
    width: 38px;
    height: 32px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .pa-toggle button.p[aria-pressed="true"] {
    background: var(--present);
    color: white;
  }
  .pa-toggle button.a[aria-pressed="true"] {
    background: var(--absent);
    color: white;
  }

  /* Roster page row */
  .row .pct {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .row .pct small {
    display: block;
    text-align: right;
    font-weight: 500;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .row .pct.warn { color: var(--warn); }
  .row .pct.danger { color: var(--absent); }

  /* Search */
  .search {
    position: relative;
    margin-bottom: 12px;
  }
  .search input {
    width: 100%;
    border: 1px solid var(--line-2);
    background: var(--surface);
    padding: 11px 14px 11px 38px;
    border-radius: var(--r-pill);
    font-size: 14px;
  }
  .search svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted);
  }

  /* Section heading */
  .section-h {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 18px 4px 8px;
  }
  .section-h h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .section-h .link {
    font-size: 12.5px;
    color: var(--accent-ink);
    font-weight: 600;
  }

  /* Sessions list */
  .session-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .session-card:last-child { border-bottom: 0; }
  .session-card .date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 46px;
    flex: 0 0 auto;
  }
  .session-card .date-block .m {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    color: var(--absent);
  }
  .session-card .date-block .d {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .session-card .info {
    flex: 1;
    min-width: 0;
  }
  .session-card .info .h {
    font-weight: 600;
    font-size: 14.5px;
  }
  .session-card .info .s {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .session-card .pct-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    background: var(--present-soft);
    color: var(--accent-ink);
    flex: 0 0 auto;
    font-variant-numeric: tabular-nums;
  }

  /* Detail (student) */
  .detail-header {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .detail-header .big-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1.15;
  }
  .detail-header .meta {
    color: var(--muted);
    font-size: 13px;
  }
  .history-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    padding: 14px;
  }
  .history-grid .cell {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .history-grid .cell.p { background: var(--present-soft); color: var(--accent-ink); border-color: transparent; }
  .history-grid .cell.a { background: var(--absent-soft); color: var(--absent); border-color: transparent; }

  /* Bottom nav */
  .tabbar {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 100%;
    max-width: 460px;
    height: calc(var(--tab-h) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    background: color-mix(in oklch, var(--bg) 92%, transparent);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: stretch;
    z-index: 30;
  }
  .tabbar button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    color: var(--muted);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .tabbar button svg { width: 22px; height: 22px; }
  .tabbar button[aria-current="true"] { color: var(--ink); }
  .tabbar button[aria-current="true"] svg { color: var(--accent); }

  /* Modal */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(20,15,5,.4);
    z-index: 50;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .scrim.open { display: flex; }
  .sheet {
    background: var(--surface);
    width: 100%;
    max-width: 460px;
    border-radius: 20px 20px 0 0;
    padding: 6px var(--pad-x) max(20px, env(safe-area-inset-bottom));
    max-height: 90vh;
    overflow-y: auto;
  }
  .sheet .grabber {
    width: 36px; height: 4px;
    background: var(--line-2);
    border-radius: 4px;
    margin: 8px auto 14px;
  }
  .sheet h3 {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .sheet .form-row {
    display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px;
  }
  .sheet .form-row label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sheet input, .sheet select {
    border: 1px solid var(--line-2);
    background: var(--surface);
    padding: 11px 13px;
    border-radius: var(--r-btn);
    font-size: 15px;
  }
  .btn {
    padding: 12px 16px;
    border-radius: var(--r-btn);
    font-weight: 600;
    font-size: 14.5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary { background: var(--ink); color: white; }
  .btn-secondary { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
  .btn-danger { background: var(--absent-soft); color: var(--absent); }
  .btn-row { display: flex; gap: 8px; margin-top: 4px; }
  .btn-row > .btn { flex: 1; }

  /* Empty state */
  .empty {
    padding: 36px 18px;
    text-align: center;
    color: var(--muted);
  }
  .empty .ill {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .empty h3 { margin: 0 0 4px; font-size: 16px; color: var(--ink); font-weight: 600; }
  .empty p { margin: 0; font-size: 13px; }

  /* Settings rows */
  .settings-group {
    background: var(--surface);
    border-radius: var(--r-card);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .1s;
  }
  .setting-row:last-child { border-bottom: 0; }
  .setting-row:active { background: var(--surface-2); }
  .setting-row .icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    flex: 0 0 auto;
  }
  .setting-row .icon svg { width: 18px; height: 18px; }
  .setting-row .label {
    flex: 1;
    font-weight: 500;
  }
  .setting-row .hint {
    color: var(--muted);
    font-size: 13px;
  }
  .setting-row .chev { color: var(--muted); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + 18px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    opacity: 0;
    background: var(--ink);
    color: white;
    padding: 10px 16px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 500;
    z-index: 60;
    pointer-events: none;
    transition: transform .25s, opacity .25s;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,.3);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Hide native number input arrows */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }

  @media (max-width: 360px) {
    :root { --pad-x: 14px; }
    .class-switch { gap: 10px; }
    .title-block h1 { font-size: 23px; }
    .class-pill { padding: 6px 11px; }
    .row { gap: 9px; padding: 11px 12px; }
    .pa-toggle button { width: 35px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="topline">
      <div class="brand">
        <span class="dot"></span>
        <span>Attendance</span>
      </div>
